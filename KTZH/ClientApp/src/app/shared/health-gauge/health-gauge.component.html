<div class="gauge-container">
  <svg viewBox="0 0 200 120" class="gauge-svg">
    <!-- Background arc (grey track) -->
    <path
      d="M 20 100 A 80 80 0 0 1 180 100"
      fill="none"
      stroke="#2a3a50"
      stroke-width="12"
      stroke-linecap="round"
    />
    <!-- Value arc -->
    <path
      [attr.d]="arcPath"
      fill="none"
      [attr.stroke]="color"
      stroke-width="12"
      stroke-linecap="round"
      class="gauge-arc"
    />
    <!-- Score number -->
    <text x="100" y="90" text-anchor="middle" class="gauge-score" [attr.fill]="color">
      {{ score }}
    </text>
    <!-- Grade letter -->
    <text x="100" y="112" text-anchor="middle" class="gauge-grade" [attr.fill]="color">
      {{ grade }}
    </text>
  </svg>
</div>
