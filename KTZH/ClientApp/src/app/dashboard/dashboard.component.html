<div class="dashboard">
  <!-- Header -->
  <header class="dash-header">
    <div class="header-left">
      <span class="logo">KTZ</span>
      <span class="logo-sub">Locomotive Dashboard</span>
    </div>
    <div class="header-center">
      <span class="fleet-health" [style.color]="fleetHealthAvg >= 75 ? 'var(--color-normal)' : fleetHealthAvg >= 50 ? 'var(--color-warning)' : 'var(--color-critical)'">
        Парк: {{ fleetHealthAvg }}
      </span>
    </div>
    <div class="header-right">
      <button class="tab-btn" [class.active]="viewMode === 'map'" (click)="viewMode = 'map'">Карта</button>
      <button class="tab-btn" [class.active]="viewMode === 'list'" (click)="viewMode = 'list'">Список</button>
    </div>
  </header>

  <!-- Body -->
  <div class="dash-body">
    <div class="dash-main full-width">
      <app-fleet-map *ngIf="viewMode === 'map'"></app-fleet-map>
      <app-fleet-list *ngIf="viewMode === 'list'"></app-fleet-list>
    </div>
  </div>
</div>
