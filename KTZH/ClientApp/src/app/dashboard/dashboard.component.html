<div class="dashboard">
  <!-- Header -->
  <header class="dash-header">
    <div class="header-left">
      <span class="logo">KTZ</span>
      <span class="logo-sub">Locomotive Dashboard</span>
    </div>
    <div class="header-center">
      <span class="fleet-health" [style.color]="fleetHealthAvg >= 75 ? '#22c55e' : fleetHealthAvg >= 50 ? '#f59e0b' : '#ef4444'">
        Парк: {{ fleetHealthAvg }}
      </span>
      <span class="alert-counter" *ngIf="alertCount > 0">{{ alertCount }} алертов</span>
      <span class="conn-status" [class.online]="connected">
        {{ connected ? 'LIVE' : 'OFFLINE' }}
      </span>
    </div>
    <div class="header-right">
      <button class="tab-btn" [class.active]="viewMode === 'map'" (click)="viewMode = 'map'">Карта</button>
      <button class="tab-btn" [class.active]="viewMode === 'list'" (click)="viewMode = 'list'">Список</button>
    </div>
  </header>

  <!-- Body -->
  <div class="dash-body">
    <div class="dash-main">
      <app-fleet-map *ngIf="viewMode === 'map'"></app-fleet-map>
      <app-fleet-list *ngIf="viewMode === 'list'"></app-fleet-list>
    </div>
    <aside class="dash-sidebar">
      <app-alert-panel></app-alert-panel>
    </aside>
  </div>
</div>
