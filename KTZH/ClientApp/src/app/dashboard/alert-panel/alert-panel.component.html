<div class="alert-panel">
  <div class="alert-header">
    <span class="alert-title">Алерты</span>
    <div class="alert-counts">
      <span class="count-critical" *ngIf="criticalCount > 0">{{ criticalCount }} крит.</span>
      <span class="count-warning" *ngIf="warningCount > 0">{{ warningCount }} пред.</span>
    </div>
  </div>

  <div class="alert-list" *ngIf="alerts.length > 0; else noAlerts">
    <div
      *ngFor="let alert of alerts"
      class="alert-item"
      [ngClass]="'severity-' + alert.severity.toLowerCase()"
      (click)="goToLocomotive(alert)"
    >
      <span class="alert-icon" *ngIf="alert.severity === 'Critical'">🔴</span>
      <span class="alert-icon" *ngIf="alert.severity === 'Warning'">🟠</span>
      <span class="alert-icon" *ngIf="alert.severity === 'Info'">🔵</span>

      <div class="alert-body">
        <div class="alert-top">
          <span class="alert-loco">{{ alert.locomotiveId }}</span>
          <span class="alert-time">{{ timeAgo(alert.triggeredAt) }}</span>
        </div>
        <div class="alert-message">{{ alert.parameter }}</div>
      </div>
    </div>
  </div>

  <ng-template #noAlerts>
    <div class="no-alerts">Нет активных алертов</div>
  </ng-template>
</div>
